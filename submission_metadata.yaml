ai_usage_summary: |
  Used ChatGPT for architecture discussions, workflow planning, documentation refinement, and submission preparation. Used Gemini for code optimization and refactoring. Used Claude for code review and structural audits. Used GitHub Copilot for code completion. No external AI service is used during candidate parsing, scoring, ranking, or reasoning generation.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-dimensional heuristic ranking engine for Senior AI Engineer candidates. Transforms nested JSON schemas into a flat FeatureVector of 62 engineered features. Uses an advanced 10-group skill taxonomy and 5-stage pipeline completeness check to identify search specialists. Incorporates a forensic trust layer to flag salary inversions, date paradoxes, and inflated YoE, scaling the base score via a multiplicative trust multiplier. Ensures deterministic CPU-only execution within the competition runtime constraints (verified at approximately 2 minutes 10 seconds for the full 100,000-candidate dataset).

